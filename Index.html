<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { 
        background-color: #f8f9fa; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        margin: 0;
        padding: 0;
      }
      
      /* CONTENEDOR FIJO: Anclaje superior para buscador y logo */
      .contenedor-fijo {
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: #f8f9fa;
        padding-bottom: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      }

      /* CABECERA ESTILO CLUB: Combinación institucional Negro y Oro */
      .header-club { 
        background: linear-gradient(135deg, #111111 0%, #222222 100%); 
        color: #ffffff; 
        padding: 20px 15px; 
        border-bottom-left-radius: 25px; 
        border-bottom-right-radius: 25px; 
        text-align: center; 
        position: relative;
        border-bottom: 4px solid #fecb00; 
      }

      .logo-club {
        max-width: 65px;
        height: auto;
        margin-bottom: 8px;
        filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
      }

      .titulo-panel {
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #fecb00; 
        margin: 0;
        text-transform: uppercase;
      }

      /* BOTONES DE FILTRADO PREMIUM */
      .grupo-filtros .btn {
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 20px;
        padding: 6px 16px;
        transition: all 0.2s ease;
      }
      
      .btn-club-outline {
        border: 2px solid #111111;
        color: #111111;
        background: transparent;
      }
      
      .btn-club-outline:hover, .btn-club-outline.active {
        background: #111111;
        color: #fecb00;
      }

      /* TARJETAS DE JUGADORES OPTIMIZADAS */
      .tarjeta-jugador { 
        background: white; 
        border-radius: 14px; 
        padding: 16px; 
        margin-bottom: 14px; 
        box-shadow: 0 3px 8px rgba(0,0,0,0.03); 
        border-left: 6px solid #198754; /* Verde por defecto (Al día) */
        transition: transform 0.2s; 
      }
      
      /* Variación para 1 cuota */
      .tarjeta-advertencia {
        border-left: 6px solid #ffc107; 
        background-color: #fffdf6;
      }
      
      /* Alerta crítica de morosidad con rojo institucional */
      .tarjeta-alerta { 
        border-left: 6px solid #dc3545; 
        background-color: #fffafb; 
      }
      
      .badge-critico { 
        background-color: #dc3545; 
        color: white; 
        font-size: 0.75rem; 
        padding: 6px 10px; 
        border-radius: 8px; 
        font-weight: bold; 
        text-transform: uppercase;
      }

      .badge-regular {
        background-color: #e8f5e9;
        color: #2e7d32;
        font-size: 0.75rem;
        padding: 6px 10px;
        border-radius: 8px;
        font-weight: bold;
        border: 1px solid #c8e6c9;
        text-transform: uppercase;
      }
      
      .badge-cuota-unica {
        background-color: #fff3cd;
        color: #856404;
        font-size: 0.75rem;
        padding: 6px 10px;
        border-radius: 8px;
        font-weight: bold;
        border: 1px solid #ffeeba;
        text-transform: uppercase;
      }

      .monto-deuda { 
        color: #dc3545; 
        font-weight: 700; 
      }
      
      .loader { 
        text-align: center; 
        margin: 40px 0; 
      }
      
      .zona-scroll {
        padding-top: 15px;
      }

      .form-select-lg, .form-control-lg {
        font-size: 1rem;
        border-radius: 10px;
        border: 1px solid #ced4da;
      }

      .form-select-lg:focus, .form-control-lg:focus {
        border-color: #fecb00;
        box-shadow: 0 0 0 0.25rem rgba(254, 203, 0, 0.25);
      }

      /* BOTÓN DESCARGAR PDF GENERAL SUPERIOR */
      .btn-pdf-general-superior {
        background: #111111;
        color: #fecb00;
        border: 2px solid #fecb00;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: bold;
        transition: all 0.2s ease;
        width: 100%;
        max-width: 400px;
        margin: 10px auto 0 auto;
        display: none;
      }
      .btn-pdf-general-superior:hover {
        background: #fecb00;
        color: #111111;
      }

      /* ==========================================
         ESTILOS EXCLUSIVOS PARA IMPRESIÓN / PDF
         ========================================== */
      @media print {
        body {
          background-color: #ffffff !important;
          font-size: 11pt;
        }
        #btnPdf, 
        .btn-pdf-general-superior,
        #loader,
        .contenedor-fijo,
        .btn-light {
          display: none !important;
        }
        .tarjeta-jugador {
          page-break-inside: avoid;
          break-inside: avoid;
          border: 1px solid #ced4da !important;
          border-left: 6px solid #198754 !important;
          box-shadow: none !important;
          background: #ffffff !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          margin-bottom: 20px;
        }
        .tarjeta-advertencia {
          border-left: 6px solid #ffc107 !important;
          background-color: #fffdf6 !important;
        }
        .tarjeta-alerta {
          border-left: 6px solid #dc3545 !important;
          background-color: #fffafb !important;
        }
        .monto-deuda {
          color: #dc3545 !important;
        }
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }
    </style>
  </head>
  <body>

    <div class="contenedor-fijo">
      <div class="header-club">
        <img src="https://lh3.googleusercontent.com/d/1BPl6CKfLUbqmQfWlST8SNeRb7OC1aNvx" alt="Escudo S.F.P. Gonnet" class="logo-club">
        <h2 class="titulo-panel">Reporte Deudas Cuotas de jugadores</h2>
      </div>

      <div class="container mt-3">
        <div class="bg-white p-3 rounded-3 shadow-sm mb-1">
          <div class="mb-3">
            <label for="buscarDivision" class="form-label fw-bold text-secondary" style="font-size: 0.9rem;">🔍 Escribe para buscar división:</label>
            <input type="text" id="buscarDivision" class="form-control form-control-lg" placeholder="Ej: Senior, 2010, Femenino..." oninput="filtrarDivisiones()">
          </div>

          <div class="mb-3">
            <label for="selectDivision" class="form-label fw-bold text-secondary" style="font-size: 0.9rem;">📋 Selecciona la opción filtrada:</label>
            <select id="selectDivision" class="form-select form-select-lg" onchange="cargarDeudas()">
              <option value="">Cargando listado...</option>
            </select>
          </div>

          <div id="seccionFiltrosPrincipal" class="text-center mt-2 mb-1 d-flex flex-wrap justify-content-center gap-1">
            <button id="btnTodo" class="btn btn-sm btn-dark active" onclick="filtrarPorEstado('todos')">👥 Plantel Completo</button>
            <button id="btnDebe1" class="btn btn-sm btn-outline-dark" onclick="filtrarPorEstado('debe1')">⚠️ Debe 1 Cuota</button>
            <button id="btnDebe2" class="btn btn-sm btn-outline-dark" onclick="filtrarPorEstado('debe2')">🚨 Debe ≥ 2 Cuotas</button>
            <button id="btnDebeMatricula" class="btn btn-sm btn-outline-danger" onclick="filtrarPorEstado('debeMatricula')">📋 Debe Matrícula</button>
          </div>

          <div class="text-center">
            <button id="btnPdfGeneralSuperior" class="btn btn-pdf-general-superior" onclick="descargarPDF()">
              Descargar Plantel Completo en PDF 📄
            </button>
          </div>
        </div>
      </div>
    </div>

    <button id="btnPdf" style="display:none;" onclick="descargarPDF()">
      📄 Descargar PDF
    </button>

    <div class="container zona-scroll">
      <div id="loader" class="loader" style="display: none;">
        <div class="spinner-border text-dark" role="status"></div>
        <div class="mt-2 text-muted small">Buscando jugadores en la base de datos...</div>
      </div>

      <div id="contenedorTarjetas"></div>
    </div>

    <script>
      let todasLasDivisiones = [];
      let jugadoresDeLaDivisionActual = []; 
      let datosActualesCache = null;
      let filtroMorosidadActual = 'todos'; 

      window.onload = function() {
        google.script.run.withSuccessHandler(function(divisiones) {
          todasLasDivisiones = divisiones;
          renderizarOpciones(todasLasDivisiones);
        }).obtenerDivisiones();
      };

      function renderizarOpciones(lista) {
        let select = document.getElementById('selectDivision');
        select.innerHTML = '<option value="">-- Elige una División (' + lista.length + ') --</option>';
        
        lista.forEach(function(div) {
          let opt = document.createElement('option');
          opt.value = div;
          opt.textContent = div;
          select.appendChild(opt);
        });
      }

      // Ajustado para que resguarde las llamadas originales sin romper lógica de caché
      function filtrarDivisiones() {
        let textoBuscado = document.getElementById('buscarDivision').value.toLowerCase().trim();
        let contenedor = document.getElementById('contenedorTarjetas');
        let btnPdf = document.getElementById('btnPdf');
        let btnPdfGeneralSuperior = document.getElementById('btnPdfGeneralSuperior');
        contenedor.innerHTML = '';
        btnPdf.style.display = 'none';
        if(btnPdfGeneralSuperior) btnPdfGeneralSuperior.style.display = 'none';
        datosActualesCache = null;
        
        let divisionesFiltradas = todasLasDivisiones.filter(function(div) {
          return div.toLowerCase().includes(textoBuscado);
        });
        
        renderizarOpciones(divisionesFiltradas);
      }

      function cargarDeudas() {
        let division = document.getElementById('selectDivision').value;
        let contenedor = document.getElementById('contenedorTarjetas');
        let loader = document.getElementById('loader');
        let btnPdf = document.getElementById('btnPdf');
        let btnPdfGeneralSuperior = document.getElementById('btnPdfGeneralSuperior');
        
        if (!division) {
          contenedor.innerHTML = '';
          btnPdf.style.display = 'none';
          if(btnPdfGeneralSuperior) btnPdfGeneralSuperior.style.display = 'none';
          datosActualesCache = null;
          return;
        }
        
        contenedor.innerHTML = '';
        btnPdf.style.display = 'none';
        if(btnPdfGeneralSuperior) btnPdfGeneralSuperior.style.display = 'none';
        loader.style.display = 'block';
        
        google.script.run.withSuccessHandler(function(objetoContenedor) {
          loader.style.display = 'none';
          
          let meses = objetoContenedor.nombresMeses;
          datosActualesCache = objetoContenedor;
          jugadoresDeLaDivisionActual = objetoContenedor.listaJugadores; 
          
          if(btnPdfGeneralSuperior) btnPdfGeneralSuperior.style.display = 'block';
          
          renderizarTarjetas(jugadoresDeLaDivisionActual, meses);
        }).obtenerDeudasPorDivision(division);
      }

      function cambiarFiltroDeuda(tipoFiltro) {
        filtroMorosidadActual = tipoFiltro;
        actualizarEstilosBotones();
        renderizarTarjetasFiltradas();
      }

      function actualizarEstilosBotones() {
        // Mantenemos estas referencias vacías para evitar errores de consola si la caché los invoca
        let b1 = document.getElementById('btnFiltroTodo');
        let b2 = document.getElementById('btnFiltroUno');
        let b3 = document.getElementById('btnFiltroVarios');
        if(b1) b1.classList.remove('active');
        if(b2) b2.classList.remove('active');
        if(b3) b3.classList.remove('active');
        
        if (filtroMorosidadActual === 'todos' && b1) b1.classList.add('active');
        if (filtroMorosidadActual === '1cuota' && b2) b2.classList.add('active');
        if (filtroMorosidadActual === '2mas' && b3) b3.classList.add('active');
      }

      

      function filtrarPorEstado(estado) {
        document.getElementById('btnTodo').className = 'btn btn-sm ' + (estado === 'todos' ? 'btn-dark active' : 'btn-outline-dark');
        document.getElementById('btnDebe1').className = 'btn btn-sm ' + (estado === 'debe1' ? 'btn-dark active' : 'btn-outline-dark');
        document.getElementById('btnDebe2').className = 'btn btn-sm ' + (estado === 'debe2' ? 'btn-dark active' : 'btn-outline-dark');
        document.getElementById('btnDebeMatricula').className = 'btn btn-sm ' + (estado === 'debeMatricula' ? 'btn-danger active' : 'btn-outline-danger');

        let listaFiltrada = [];
        
        if (estado === 'todos') {
          listaFiltrada = jugadoresDeLaDivisionActual;
        } 
        else if (estado === 'debe1') {
          listaFiltrada = jugadoresDeLaDivisionActual.filter(j => !j.alerta && j.total > 0);
        } 
        else if (estado === 'debe2') {
          listaFiltrada = jugadoresDeLaDivisionActual.filter(j => j.alerta);
        } 
        else if (estado === 'debeMatricula') {
          listaFiltrada = jugadoresDeLaDivisionActual.filter(j => j.matricula > 0);
        }

        // Corregido: Consumir siempre los meses reales provenientes del caché para evitar desalineación de arrays
        let mesesReales = datosActualesCache ? datosActualesCache.nombresMeses : [];
        renderizarTarjetas(listaFiltrada, mesesReales);
      }

function renderizarTarjetasFiltradas() {
        let contenedor = document.getElementById('contenedorTarjetas');
        let btnPdf = document.getElementById('btnPdf');
        contenedor.innerHTML = '';
        
        if (!datosActualesCache) {
          btnPdf.style.display = 'none';
          return;
        }
        
        let meses = datosActualesCache.nombresMeses;
        let jugadores = datosActualesCache.listaJugadores;
        
        if (jugadores.length === 0) {
          contenedor.innerHTML = '<div class="alert alert-light text-center shadow-sm text-muted">No se registran jugadores activos en esta categoría.</div>';
          btnPdf.style.display = 'none';
          return;
        }
        
        let formateador = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
        let contadorVisualizados = 0;

        jugadores.forEach(function(j) {
          let mesesDebidos = 0;
          j.valoresMeses.forEach(function(monto) {
            if (monto > 0) mesesDebidos++;
          });
          
          if (filtroMorosidadActual === '1cuota' && mesesDebidos !== 1) return;
          if (filtroMorosidadActual === '2mas' && mesesDebidos < 2) return;
          
          contadorVisualizados++;
          
          let divTarjeta = document.createElement('div');
          
          let claseBorde = '';
          if (mesesDebidos === 1) {
            claseBorde = ' tarjeta-advertencia';
          } else if (mesesDebidos >= 2) {
            claseBorde = ' tarjeta-alerta';
          }
          divTarjeta.className = 'tarjeta-jugador' + claseBorde;
          
          let bloqueDescuento = "";
          if (j.descuento || j.periodoDesc) {
            bloqueDescuento = `<div class="mt-1 text-dark small" style="font-size: 0.8rem;">🎁 <strong>Bonificación:</strong> ${j.descuento} ${j.periodoDesc}</div>`;
          }

          let bloquesMesesHTML = "";
          for (let i = 0; i < meses.length; i++) {
            let montoMes = j.valoresMeses[i];
            let claseColor = montoMes > 0 ? 'monto-deuda' : 'text-success';
            
            bloquesMesesHTML += `
              <div class="col-4 col-sm-3 mb-1">
                <span class="text-muted" style="font-size: 0.72rem;">${meses[i]}</span><br>
                <span class="${claseColor}" style="font-size: 0.82rem; font-weight: 600;">${formateador.format(montoMes)}</span>
              </div>`;
          }

          // UBICACIÓN INYECTADA: Forzamos el Último Pago abajo del nombre de forma directa y visible
          divTarjeta.innerHTML = `
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="text-start">
                  <span class="fw-bold text-dark" style="font-size: 1.05rem; display: block;">${j.nombre}</span>
                  <small class="text-muted" style="font-size: 0.75rem; display: block; margin-top: 2px;">Último Pago registrado: <b style="color: #dc3545 !important;">${j.ultimoPago || '-'}</b></small>
                </div>
                ${j.alerta ? '<span class="badge-critico">🔴 Debe 2 ó más meses</span>' : '<span class="badge-regular">✓ Regular</span>'}
              </div>
              
              <div class="row g-1 border-top pt-2 mt-1 text-start">
                ${bloquesMesesHTML}
                <div class="col-4 col-sm-3 mb-1">
                  <span class="text-secondary" style="font-size: 0.72rem; font-weight: bold;">Matrícula</span><br>
                  <span class="${j.matricula > 0 ? 'text-primary' : 'text-muted'}" style="font-size: 0.82rem; font-weight: 700;">
                    ${formateador.format(j.matricula)}
                  </span>
                </div>
              </div>

              <div class="border-top pt-2 mt-2 small text-secondary" style="font-size: 0.8rem; text-align: left;">
                <div><strong>Forma de Pago:</strong> ${j.formaPago}</div>
                ${bloqueDescuento}
              </div>

              <div class="d-flex justify-content-between align-items-center border-top pt-2 mt-2">
                <button class="btn btn-sm btn-light border" style="font-size: 0.8rem; font-weight: 600;" onclick="descargarFichaPDF(this)">Descargar Ficha PDF 📄</button>
                <div class="text-end fw-bold text-dark" style="font-size: 1.05rem;">
                  Total a Cobrar: <span class="monto-deuda">${formateador.format(j.total)}</span>
                </div>
              </div>
            `;
          contenedor.appendChild(divTarjeta);
        });
        
        if (contadorVisualizados === 0) {
          let msg = "No hay jugadores en esta condición para el filtro seleccionado.";
          if (filtroMorosidadActual === '1cuota') msg = "No hay ningún jugador que deba exactamente 1 cuota.";
          if (filtroMorosidadActual === '2mas') msg = "No hay ningún jugador moroso con 2 o más cuotas vencidas.";
          contenedor.innerHTML = `<div class="alert alert-light text-center shadow-sm text-muted">${msg}</div>`;
        }
      }

      function renderizarTarjetas(jugadores, meses) {
        let contenedor = document.getElementById('contenedorTarjetas');
        contenedor.innerHTML = '';

        if(jugadores.length === 0) {
          contenedor.innerHTML = '<div class="alert alert-light text-center shadow-sm text-muted">No se registran jugadores bajo este filtro en la categoría.</div>';
          return;
        }

        let formateador = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

        jugadores.forEach(function(j) {
          let divTarjeta = document.createElement('div');
          divTarjeta.className = 'tarjeta-jugador' + (j.alerta ? ' tarjeta-alerta' : '');
          
          let bloqueDescuento = "";
          if (j.descuento || j.periodoDesc) {
            bloqueDescuento = `<div class="mt-1 text-dark small" style="font-size: 0.8rem;">🎁 <strong>Bonificación:</strong> ${j.descuento} ${j.periodoDesc}</div>`;
          }

          let bloquesMesesHTML = "";
          for (let i = 0; i < meses.length; i++) {
            let montoMes = j.valoresMeses[i];
            let claseColor = montoMes > 0 ? 'monto-deuda' : 'text-success';
            
            bloquesMesesHTML += `
              <div class="col-4 col-sm-3 mb-1">
                <span class="text-muted" style="font-size: 0.72rem;">${meses[i]}</span><br>
                <span class="${claseColor}" style="font-size: 0.82rem; font-weight: 600;">${formateador.format(montoMes)}</span>
              </div>`;
          }

          // UBICACIÓN INYECTADA: Forzamos el Último Pago abajo del nombre de forma directa y visible
          divTarjeta.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="text-start">
                <span class="fw-bold text-dark" style="font-size: 1.05rem; display: block;">${j.nombre}</span>
                <small class="text-muted" style="font-size: 0.75rem; display: block; margin-top: 2px;">Último Pago registrado: <b style="color: #dc3545 !important;">${j.ultimoPago || '-'}</b></small>
              </div>
              ${j.alerta ? '<span class="badge-critico">🔴 Debe 2 ó más meses</span>' : '<span class="badge-regular">✓ Regular</span>'}
            </div>
            
            <div class="row g-1 border-top pt-2 mt-1 text-start">
              ${bloquesMesesHTML}
              <div class="col-4 col-sm-3 mb-1">
                <span class="text-secondary" style="font-size: 0.72rem; font-weight: bold;">Matrícula</span><br>
                <span class="${j.matricula > 0 ? 'text-primary' : 'text-muted'}" style="font-size: 0.82rem; font-weight: 700;">
                  ${formateador.format(j.matricula)}
                </span>
              </div>
            </div>

            <div class="border-top pt-2 mt-2 small text-secondary" style="font-size: 0.8rem; text-align: left;">
              <div><strong>Forma de Pago:</strong> ${j.formaPago}</div>
              ${bloqueDescuento}
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-2 mt-2">
              <button class="btn btn-sm btn-light border" style="font-size: 0.8rem; font-weight: 600;" onclick="descargarFichaPDF(this)">Descargar Ficha PDF 📄</button>
              <div class="text-end fw-bold text-dark" style="font-size: 1.05rem;">
                Total a Cobrar: <span class="monto-deuda">${formateador.format(j.total)}</span>
              </div>
            </div>
          `;
          contenedor.appendChild(divTarjeta);
        });
      }

function descargarPDF() {
        let divisionSeleccionada = document.getElementById('selectDivision').value;
        let tituloOriginal = document.title;
        document.title = "Reporte_Deudas_" + divisionSeleccionada.replace(/[^a-zA-Z0-9]/g, "_");
        window.print();
        document.title = tituloOriginal;
      }
      // Entorno de impresión aislado e individual por popup
      function descargarFichaPDF(boton) {
        let tarjetaOriginal = boton.closest('.tarjeta-jugador');
        let nombreJugador = tarjetaOriginal.querySelector('.fw-bold').textContent.trim();
        
        let tarjetaClonada = tarjetaOriginal.cloneNode(true);
        let botonClonado = tarjetaClonada.querySelector('.btn-light');
        if (botonClonado) botonClonado.remove();
        
        let ventanaImpresion = window.open('', '_blank', 'height=600,width=800');
        
        ventanaImpresion.document.write('<html><head><title>Ficha_' + nombreJugador.replace(/[^a-zA-Z0-9]/g, "_") + '</title>');
        ventanaImpresion.document.write('<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">');
        ventanaImpresion.document.write('<style>');
        ventanaImpresion.document.write('body { background-color: #ffffff; padding: 30px; font-family: sans-serif; }');
        ventanaImpresion.document.write('.tarjeta-jugador { background: white; border-radius: 14px; padding: 20px; border: 1px solid #ced4da !important; border-left: 6px solid #198754 !important; }');
        ventanaImpresion.document.write('.tarjeta-alerta { border-left: 6px solid #dc3545 !important; }');
        ventanaImpresion.document.write('.monto-deuda { color: #dc3545 !important; font-weight: 700; }');
