<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Deudas - Club SFP GONNET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f4f6f9; font-family: sans-serif; margin: 0; padding: 0; }
      
      /* PANTALLA DE ACCESO / LOGIN */
      .login-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #1a1a1a;
      }
      
      .login-box {
        background-color: #ffffff;
        padding: 40px 35px;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        width: 100%;
        max-width: 400px;
        text-align: center;
        border-bottom: 6px solid #fecb00;
      }
      
      .logo-login { max-width: 150px; height: auto; margin-bottom: 20px; }
      
      .titulo-login {
        font-size: 1.3rem;
        font-weight: 700;
        color: #111111;
        text-transform: uppercase;
        margin-bottom: 25px;
        letter-spacing: 0.5px;
      }
      
      .btn-club-login {
        background-color: #111111; color: #fecb00; font-weight: bold;
        text-transform: uppercase; border-radius: 8px; padding: 12px; width: 100%;
        border: 2px solid #111111; transition: all 0.3s ease;
      }
      .btn-club-login:hover { background-color: #222222; color: #ffffff; border-color: #fecb00; }

      /* PANEL PRINCIPAL DE JUGADORES */
      .contenedor-fijo { position: sticky; top: 0; z-index: 1000; background-color: #f4f6f9; padding-bottom: 10px; }
      .header-club { 
        background-color: #111111; color: #fecb00; padding: 18px; 
        border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; text-align: center; 
        border-bottom: 4px solid #fecb00; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }
      .tarjeta-jugador { 
        background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; 
        box-shadow: 0 3px 8px rgba(0,0,0,0.04); border-left: 6px solid #198754; 
      }
      .tarjeta-advertencia { border-left: 6px solid #ffc107; }
      .tarjeta-alerta { border-left: 6px solid #dc3545; }
      .badge-critico { background-color: #dc3545; color: white; font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; font-weight: bold; }
      .monto-deuda { color: #dc3545; font-weight: bold; }
      .loader { text-align: center; margin: 30px 0; }
      .zona-scroll { padding-top: 15px; }
    </style>
  </head>
  <body>

    <div id="seccionLogin" class="login-screen">
      <div class="login-box">
        <img src="https://lh3.googleusercontent.com/d/1BPl6CKfLUbqmQfWlST8SNeRb7OC1aNvx" alt="Escudo Club SFP Gonnet" class="logo-login">
        <h2 class="titulo-login">Acceso Técnicos</h2>
        
        <div class="mb-3 text-start">
          <label for="selectLoginCategoria" class="form-label fw-bold text-secondary" style="font-size: 0.85rem;">Seleccione Categoría:</label>
          <select id="selectLoginCategoria" class="form-select form-select-lg" style="font-size: 0.95rem; border-radius: 8px;">
            <option value="" disabled selected>Cargando listado...</option>
          </select>
        </div>

        <div class="mb-4 text-start">
          <label for="inputContrasenia" class="form-label fw-bold text-secondary" style="font-size: 0.85rem;">Contraseña:</label>
          <input type="password" id="inputContrasenia" class="form-control form-control-lg" placeholder="Clave de la división" style="font-size: 0.95rem; border-radius: 8px;">
        </div>

        <button id="btnAutenticar" class="btn btn-club-login" onclick="validarCredenciales()">INGRESAR</button>
        <div id="alertLoginError" class="alert alert-danger mt-3 py-2 small d-none" role="alert"></div>
      </div>
    </div>

    <div id="appPanelPrincipal" style="display: none;">
      <div class="contenedor-fijo">
        <div class="header-club">
          <h4 id="textoDinamicoCategoria" class="m-0 fw-bold" style="letter-spacing: 0.5px;">REPORTE DE DEUDAS</h4>
        </div>
        <div class="container mt-3 text-center">
          <button id="btnPdf" class="btn btn-sm btn-secondary w-100 fw-bold py-2 shadow-sm" style="max-width:320px; border-radius: 8px;" onclick="window.print()">
            Descargar PDF de este Plantel 📄
          </button>
        </div>
      </div>

      <div class="container zona-scroll">
        <div id="loader" class="loader" style="display: none;">
          <div class="spinner-border text-dark" role="status"></div>
          <div class="mt-2 text-muted small fw-bold">Buscando lista de deudores...</div>
        </div>
        <div id="contenedorTarjetas"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Actualizado con el último ejecutable de GAS que enviaste
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxbP8ez0hackQL6kWsw-dpWSQMrcDh_bOp4wgoDFvVH8BF1MGliIoHvdjhSYhS3lLps/exec"; 

      let categoriaLogueadaGlobal = "";
      let jugadoresDeLaDivisionActual = []; 
      let datosActualesCache = null;

      window.onload = function() {
  // Llama directo a la función de tu Código.gs
  google.script.run
    .withSuccessHandler(function(listaCategorias) {
      let selectLogin = document.getElementById('selectLoginCategoria');
      selectLogin.innerHTML = '<option value="" disabled selected>-- Seleccione el Plantel --</option>';
      listaCategorias.forEach(cat => {
        let opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        selectLogin.appendChild(opt);
      });
    })
    .withFailureHandler(function() {
      document.getElementById('selectLoginCategoria').innerHTML = '<option disabled>Error al enlazar el servidor</option>';
    })
    .obtenerCategoriasLogin(); // Nombre de la función en tu Código.gs
};

     function validarCredenciales() {
  let category = document.getElementById('selectLoginCategoria').value;
  let contrasenia = document.getElementById('inputContrasenia').value;
  let btn = document.getElementById('btnAutenticar');
  let divError = document.getElementById('alertLoginError');

  if (!category || !contrasenia) {
    divError.textContent = "Complete todos los campos para continuar.";
    divError.classList.remove('d-none');
    return;
  }

  btn.disabled = true; btn.textContent = "VERIFICANDO...";
  divError.classList.add('d-none');

  // Llama directo a la verificación de tu Código.gs
  google.script.run
    .withSuccessHandler(function(resultado) {
      btn.disabled = false; btn.textContent = "INGRESAR";
      if (resultado.exito) {
        categoriaLogueadaGlobal = resultado.categoria;
        document.getElementById('seccionLogin').style.display = 'none';
        document.getElementById('appPanelPrincipal').style.display = 'block';
        document.getElementById('textoDinamicoCategoria').textContent = "REPORTE DE DEUDAS: " + categoriaLogueadaGlobal.toUpperCase();
        
        ejecutarCargaDeudasSegura(categoriaLogueadaGlobal);
      } else {
        divError.textContent = resultado.mensaje; divError.classList.remove('d-none');
      }
    })
    .withFailureHandler(function() {
      btn.disabled = false; btn.textContent = "INGRESAR";
      divError.textContent = "Error de comunicación con el servidor."; divError.classList.remove('d-none');
    })
    .verificarCredencialesTecnico(category, contrasenia);
}

     function ejecutarCargaDeudasSegura(division) {
  let contenedor = document.getElementById('contenedorTarjetas');
  let loader = document.getElementById('loader');
  contenedor.innerHTML = ''; loader.style.display = 'block';
  
  // Llama directo a obtener las deudas en tu Código.gs
  google.script.run
    .withSuccessHandler(function(objetoContenedor) {
      loader.style.display = 'none';
      datosActualesCache = objetoContenedor;
      jugadoresDeLaDivisionActual = objetoContenedor.listaJugadores; 
      renderizarTarjetas(jugadoresDeLaDivisionActual, objetoContenedor.nombresMeses);
    })
    .obtenerDeudasPorDivision(division);
}

function renderizarTarjetas(jugadores, meses) {
        let contenedor = document.getElementById('contenedorTarjetas');
        contenedor.innerHTML = '';
        if(!jugadores || jugadores.length === 0) {
          contenedor.innerHTML = '<div class="alert alert-light text-center shadow-sm text-muted fw-bold">No se registran saldos de deudores asignados.</div>';
          return;
        }
        let formateador = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

        jugadores.forEach(function(j) {
          let mesesDebidosCount = 0;
          if (j.valoresMeses) {
            j.valoresMeses.forEach(m => { if(m > 0) mesesDebidosCount++; });
          }

          let divTarjeta = document.createElement('div');
          divTarjeta.className = 'tarjeta-jugador' + (j.alerta ? ' tarjeta-alerta' : (mesesDebidosCount === 1 ? ' tarjeta-advertencia' : ''));
          
          let bloquesMesesHTML = "";
          if (meses && j.valoresMeses) {
            for (let i = 0; i < meses.length; i++) {
              let montoMes = j.valoresMeses[i] || 0;
              bloquesMesesHTML += `
                <div class="col-4 col-sm-3 mb-1">
                  <span class="text-muted" style="font-size:0.75rem;">${meses[i]}</span><br>
                  <span class="${montoMes > 0 ? 'monto-deuda' : 'text-success'}" style="font-size:0.85rem; font-weight:bold;">${formateador.format(montoMes)}</span>
                </div>`;
            }
          }

          divTarjeta.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="fw-bold text-dark" style="font-size:1.05rem;">${j.nombre || 'Sin Nombre'}</span>
              ${j.alerta ? '<span class="badge-critico">🔴 Debe 2 o mas meses 🔴 </span>' : '<span class="badge bg-success small">Al Día</span>'}
            </div>
            
            <div class="row g-1 border-top pt-2 mt-1 text-start">
              ${bloquesMesesHTML}
              
              <div class="col-4 col-sm-3 mb-1">
                <span class="text-secondary" style="font-size:0.75rem; font-weight:bold;">Matrícula</span><br>
                <span class="${(j.matricula || 0) > 0 ? 'monto-deuda' : 'text-muted'}" style="font-size:0.85rem; font-weight:bold;">${formateador.format(j.matricula || 0)}</span>
              </div>
            </div>

            <div class="border-top pt-2 mt-2 small text-secondary">
              <div class="row">
                <div class="col-6">
                  <strong>Forma de Pago:</strong> ${j.formaPago || '-'}
                </div>
                <div class="col-6 text-end">
                  <strong>Último Pago:</strong> <span class="text-dark fw-bold">${j.ultimoPago || '-'}</span>
                </div>
              </div>
              ${j.descuento ? `<div class="mt-1"><strong>Bonificación:</strong> ${j.descuento} ${j.periodoDesc || ''}</div>` : ''}
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-2 mt-2">
              <div>
                <button class="btn btn-sm btn-light border" style="border-radius:6px;" onclick="descargarFichaPDF(this)">Ficha PDF 📄</button>
              </div>
              <div class="text-end fw-bold text-dark" style="font-size:1.05rem;">
                Total: <span class="${(j.total || 0) === 0 ? 'text-dark' : 'monto-deuda'}">${formateador.format(j.total || 0)}</span>
              </div>
            </div>`;
          contenedor.appendChild(divTarjeta);
        });
      }      
      function descargarFichaPDF(boton) {
        let tarjetaOriginal = boton.closest('.tarjeta-jugador');
        let nombreJugador = tarjetaOriginal.querySelector('.fw-bold').textContent.trim();
        let tarjetaClonada = tarjetaOriginal.cloneNode(true);
        
        let ventanaImpresion = window.open('', '_blank', 'height=600,width=800');
        ventanaImpresion.document.write('<html><head><title>Ficha_' + nombreJugador.replace(/[^a-zA-Z0-9]/g, "_") + '</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{padding:30px;} .tarjeta-jugador{border:1px solid #ddd; padding:20px; border-left:6px solid #198754; border-radius:12px;} .tarjeta-advertencia{border-left:6px solid #ffc107;} .tarjeta-alerta{border-left:6px solid #dc3545;} .monto-deuda{color:#dc3545; font-weight:bold;}</style></head><body>');
        ventanaImpresion.document.write(tarjetaClonada.outerHTML);
        ventanaImpresion.document.write('</body></html>');
        ventanaImpresion.document.close();
        ventanaImpresion.focus();
        setTimeout(() => { ventanaImpresion.print(); ventanaImpresion.close(); }, 500);
      }
    </script>
  </body>
</html>
